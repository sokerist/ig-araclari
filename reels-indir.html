<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="yS1E8xxefLgNPInhTn45kQI9MUFWK6j2K8McfKY_ZYk" />
    <title>Instagram Araçları | Anonim Görüntüleyici</title>
    <link rel="stylesheet" href="style.css"> <!-- CSS dosyanın adından emin ol -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="vanta-bg"></div>
    <div class="container">
        <div class="main-card">
            <div class="header">
                <img src="logo.png" alt="Logo" class="logo"> <!-- Logon varsa -->
                <h1 id="mainHeading">Instagram Araçları</h1>
                <p id="descText">Yükleniyor...</p>
            </div>

            <div class="tabs-container">
                <button class="tab-btn" id="tabProfile"><i class="fa-solid fa-user-circle"></i> <span class="tab-text">PROFİL</span></button>
                <button class="tab-btn" id="tabPosts"><i class="fa-solid fa-border-all"></i> <span class="tab-text">GÖNDERİLER</span></button>
                <button class="tab-btn" id="tabVideo"><i class="fa-solid fa-play"></i> <span class="tab-text">REELS</span></button>
                <button class="tab-btn" id="tabStory"><i class="fa-solid fa-clock-rotate-left"></i> <span class="tab-text">HİKAYE</span></button>
                <button class="tab-btn" id="tabHighlight"><i class="fa-solid fa-star"></i> <span class="tab-text">ÖNE ÇIKAN</span></button>
            </div>

            <div class="input-group">
                <span id="inputIcon" class="input-icon"></span>
                <input type="text" id="mainInput" placeholder="Kullanıcı adı...">
                <button id="searchBtn" class="search-btn">Getir <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>
    </div>

    <!-- JS DOSYALARI -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds.min.js"></script>
    
    <!-- KRİTİK AYAR: BURASI HER DOSYADA DEĞİŞECEK -->
    <script>window.PAGE_MODE = 'video';</script>
    <script src="script.js"></script>
</body>
</html>
